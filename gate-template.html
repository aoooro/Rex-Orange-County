<!DOCTYPE html>
<html class="staticrypt-html">
    <head>
        <meta charset="utf-8" />
        <title>/*[|template_title|]*/0</title>
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <meta name="robots" content="noindex, nofollow, noarchive" />

        <!-- do not cache this page -->
        <meta http-equiv="cache-control" content="max-age=0" />
        <meta http-equiv="cache-control" content="no-cache" />
        <meta http-equiv="expires" content="0" />
        <meta http-equiv="expires" content="Tue, 01 Jan 1980 1:00:00 GMT" />
        <meta http-equiv="pragma" content="no-cache" />

        <style>
            .staticrypt-html {
                height: 100%;
            }

            .staticrypt-body {
                height: 100%;
                margin: 0;
                background: #ffffff;
                color: #000000;
                font-family: Arial, Helvetica, sans-serif;
                font-size: 15px;
                line-height: 1.4;
                -webkit-font-smoothing: antialiased;
                -moz-osx-font-smoothing: grayscale;
            }

            .staticrypt-content {
                min-height: 100%;
                display: flex;
                flex-direction: column;
                box-sizing: border-box;
                padding: 20px 24px 24px;
            }

            .ooo-header {
                display: flex;
                justify-content: space-between;
                align-items: center;
                padding-bottom: 28px;
            }

            .ooo-wordmark {
                letter-spacing: 0.01em;
            }

            .ooo-logo {
                height: 14px;
                display: block;
            }

            .ooo-table {
                flex: 1;
            }

            .ooo-row {
                display: grid;
                grid-template-columns: 2fr 3fr 3fr 1fr;
                column-gap: 24px;
                align-items: baseline;
                padding: 6px 0;
            }

            .ooo-row.ooo-cols {
                padding-bottom: 18px;
            }

            .ooo-year {
                text-align: right;
            }

            .ooo-access {
                display: flex;
                align-items: center;
                gap: 14px;
            }

            .ooo-access input[type="password"],
            .ooo-access input[type="text"] {
                background: #f2f2f2;
                border: 0;
                border-radius: 0;
                outline: 0;
                font-family: inherit;
                font-size: 15px;
                color: #000000;
                padding: 6px 10px;
                width: 100%;
                max-width: 260px;
                box-sizing: border-box;
            }

            .ooo-access input::placeholder {
                color: #b3b3b3;
            }

            .staticrypt-decrypt-button {
                background: none;
                border: 0;
                padding: 0;
                font-family: inherit;
                font-size: 15px;
                color: #000000;
                cursor: pointer;
            }

            .staticrypt-decrypt-button:hover {
                text-decoration: underline;
            }

            label.staticrypt-remember {
                display: flex;
                align-items: center;
                gap: 8px;
                margin-top: 14px;
                color: #b3b3b3;
                font-size: 13px;
                cursor: pointer;
            }

            .staticrypt-remember input[type="checkbox"] {
                margin: 0;
                accent-color: #000000;
            }

            .ooo-error {
                color: #ff3b30;
                font-size: 13px;
                margin-top: 14px;
            }

            .ooo-footer {
                display: grid;
                grid-template-columns: 2fr 3fr 3fr 1fr;
                column-gap: 24px;
                padding-top: 28px;
            }

            .ooo-footer a {
                color: #000000;
                text-decoration: none;
            }

            .hidden {
                display: none !important;
            }

            .staticrypt-spinner-container {
                height: 100vh;
                display: flex;
                align-items: center;
                justify-content: center;
            }

            .staticrypt-spinner {
                display: inline-block;
                width: 1.2rem;
                height: 1.2rem;
                border: 2px solid #000000;
                border-right-color: transparent;
                border-radius: 50%;
                animation: spinner-border 0.75s linear infinite;
            }

            @keyframes spinner-border {
                100% {
                    transform: rotate(360deg);
                }
            }

            @media screen and (max-width: 760px) {
                .ooo-row,
                .ooo-footer {
                    grid-template-columns: 1fr;
                    row-gap: 6px;
                }

                .ooo-row.ooo-cols,
                .ooo-year,
                .ooo-footer span:not(:first-child) {
                    display: none;
                }

                .ooo-table {
                    display: flex;
                    align-items: center;
                }

                .ooo-access input[type="password"],
                .ooo-access input[type="text"] {
                    font-size: 16px;
                }
            }
        </style>
    </head>

    <body class="staticrypt-body">
        <div id="staticrypt_loading" class="staticrypt-spinner-container">
            <div class="staticrypt-spinner"></div>
        </div>

        <div id="staticrypt_content" class="staticrypt-content hidden">
            <header class="ooo-header">
                <span class="ooo-wordmark">OUT OF OFFICE</span>
                <svg class="ooo-logo" viewBox="0 0 340 120" xmlns="http://www.w3.org/2000/svg" aria-label="OOO">
                    <path fill="#000000" d="M95.4 24.6 A50 50 0 1 0 95.4 95.4 Q115 72 134.6 95.4 A50 50 0 1 0 134.6 24.6 Q115 48 95.4 24.6 Z" />
                    <circle fill="#000000" cx="290" cy="60" r="50" />
                </svg>
            </header>

            <div class="ooo-table">
                <div style="width: 100%">
                    <div class="ooo-row ooo-cols">
                        <span>Client</span>
                        <span>Project</span>
                        <span>Access</span>
                        <span class="ooo-year">Year</span>
                    </div>

                    <form id="staticrypt-form" class="ooo-row" action="#" method="post">
                        <span>OOO x Rex Orange County</span>
                        <span>Dream Fatigue Marketing Bible</span>
                        <span class="ooo-access">
                            <input
                                id="staticrypt-password"
                                type="password"
                                name="password"
                                placeholder="/*[|template_placeholder|]*/0"
                                autofocus
                            />
                            <input type="submit" class="staticrypt-decrypt-button" value="/*[|template_button|]*/0" />
                        </span>
                        <span class="ooo-year">2026</span>
                    </form>

                    <div class="ooo-row">
                        <span></span>
                        <span></span>
                        <span>
                            <label id="staticrypt-remember-label" class="staticrypt-remember hidden">
                                <input id="staticrypt-remember" type="checkbox" name="remember" />
                                /*[|template_remember|]*/0
                            </label>
                            <div id="staticrypt-error" class="ooo-error hidden">/*[|template_error|]*/0</div>
                        </span>
                        <span></span>
                    </div>
                </div>
            </div>

            <footer class="ooo-footer">
                <span>OOO is a 360 creative agency.</span>
                <span><a href="mailto:staff@ooo.io">staff@ooo.io</a></span>
                <span></span>
                <span></span>
            </footer>
        </div>

        <script>
            // these variables will be filled when generating the file - the template format is '/*[|variable_name|]*/0'
            const staticryptInitiator = /*[|js_staticrypt|]*/ 0;
            const templateError = "/*[|template_error|]*/0",
                isRememberEnabled = /*[|is_remember_enabled|]*/ 0,
                staticryptConfig = /*[|staticrypt_config|]*/ 0;

            // you can edit these values to customize some of the behavior of StatiCrypt
            const templateConfig = {
                rememberExpirationKey: "staticrypt_expiration",
                rememberPassphraseKey: "staticrypt_passphrase",
                replaceHtmlCallback: null,
                clearLocalStorageCallback: null,
            };

            // init the staticrypt engine
            const staticrypt = staticryptInitiator.init(staticryptConfig, templateConfig);

            // try to automatically decrypt on load if there is a saved password
            window.onload = async function () {
                const { isSuccessful } = await staticrypt.handleDecryptOnLoad();

                // if we didn't decrypt anything on load, show the password prompt. Otherwise the content has already been
                // replaced, no need to do anything
                if (!isSuccessful) {
                    // hide loading screen
                    document.getElementById("staticrypt_loading").classList.add("hidden");
                    document.getElementById("staticrypt_content").classList.remove("hidden");
                    document.getElementById("staticrypt-password").focus();

                    // show the remember me checkbox
                    if (isRememberEnabled) {
                        document.getElementById("staticrypt-remember-label").classList.remove("hidden");
                    }
                }
            };

            // handle password form submission
            document.getElementById("staticrypt-form").addEventListener("submit", async function (e) {
                e.preventDefault();

                const password = document.getElementById("staticrypt-password").value,
                    isRememberChecked = document.getElementById("staticrypt-remember").checked;

                const { isSuccessful } = await staticrypt.handleDecryptionOfPage(password, isRememberChecked);

                if (!isSuccessful) {
                    document.getElementById("staticrypt-error").classList.remove("hidden");
                    document.getElementById("staticrypt-password").value = "";
                }
            });
        </script>
    </body>
</html>
